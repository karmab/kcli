name: SNAPSHOT-MACOSX-DAILY
on:
  schedule:
    - cron: '39 20 * * 0'

env:
 CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
 PYTHONUNBUFFERED: true

jobs:

  run-workflow:
    name: Workflow
    runs-on: macos-26
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2
      - if: github.ref == 'refs/heads/main' && github.repository_owner == 'karmab'
        name: Create MACOSX pkg
        run: |
          .github/macosx.sh
